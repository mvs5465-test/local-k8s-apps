alerting:
  contactpoints.yaml:
    secret:
      apiVersion: 1
      deleteContactPoints:
      - orgId: 1
        uid: grafana-default-email
      contactPoints:
      - orgId: 1
        name: slack-monitoring
        receivers:
        - uid: slack-monitoring-webhook
          type: slack
          settings:
            url: $__env{GRAFANA_ALERTS_SLACK_WEBHOOK_URL}
            title: '{{ `{{ .Status | toUpper }}: {{ if .CommonLabels.rulename }}{{ .CommonLabels.rulename }}{{ else }}{{ .CommonLabels.alertname }}{{ end }}` }}'
            text: '{{ `{{ range .Alerts }}1) What: {{ if .Labels.rulename }}{{ .Labels.rulename }}{{ else }}{{ .Labels.alertname }}{{ end }}{{ if .Labels.namespace }} ns={{ .Labels.namespace }}{{ end }}{{ if .Labels.pod }} pod={{ .Labels.pod }}{{ end }}{{ if .Labels.container }} container={{ .Labels.container }}{{ end }} | 2) Why: {{ .Annotations.summary }} | 3) Since: {{ .StartsAt }} {{ end }}` }}'
          disableResolveMessage: false

  policies.yaml:
    apiVersion: 1
    policies:
    - orgId: 1
      receiver: slack-monitoring
      group_by:
      - grafana_folder
      - alertname
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

  rules.yaml:
    apiVersion: 1
    groups:
    - orgId: 1
      name: k8s-pod-health
      folder: Kubernetes Alerts
      interval: 1m
      rules:
      - uid: k8s-pod-crashloop
        title: K8sPodCrashLoopBackOff
        condition: B
        data:
        - refId: A
          datasourceUid: prometheus
          relativeTimeRange:
            from: 300
            to: 0
          model:
            datasource:
              type: prometheus
              uid: prometheus
            editorMode: code
            expr: sum by (namespace, pod, container) (max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff", namespace!="kube-system"}[5m]))
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          datasourceUid: __expr__
          relativeTimeRange:
            from: 0
            to: 0
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - A
              reducer:
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
            type: classic_conditions
        for: 5m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Pod has been in CrashLoopBackOff for at least 5 minutes.
          runbook_url: http://grafana.lan/dashboards
        labels:
          severity: critical
          category: kubernetes

      - uid: k8s-pod-not-ready
        title: K8sPodNotReady
        condition: B
        data:
        - refId: A
          datasourceUid: prometheus
          relativeTimeRange:
            from: 600
            to: 0
          model:
            datasource:
              type: prometheus
              uid: prometheus
            editorMode: code
            expr: sum by (namespace, pod) (max_over_time(kube_pod_status_phase{phase=~"Pending|Failed|Unknown", namespace!="kube-system"}[10m]))
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          datasourceUid: __expr__
          relativeTimeRange:
            from: 0
            to: 0
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - A
              reducer:
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
            type: classic_conditions
        for: 10m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Pod is stuck in Pending/Failed/Unknown for at least 10 minutes.
          runbook_url: http://grafana.lan/dashboards
        labels:
          severity: warning
          category: kubernetes

      - uid: k8s-pod-restarts-spiking
        title: K8sPodRestartsSpiking
        condition: B
        data:
        - refId: A
          datasourceUid: prometheus
          relativeTimeRange:
            from: 900
            to: 0
          model:
            datasource:
              type: prometheus
              uid: prometheus
            editorMode: code
            expr: sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{namespace!="kube-system"}[15m]))
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          datasourceUid: __expr__
          relativeTimeRange:
            from: 0
            to: 0
          model:
            conditions:
            - evaluator:
                params:
                - 3
                type: gt
              operator:
                type: and
              query:
                params:
                - A
              reducer:
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
            type: classic_conditions
        for: 5m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Pod container restarted more than 3 times in 15 minutes.
          runbook_url: http://grafana.lan/dashboards
        labels:
          severity: warning
          category: kubernetes

      - uid: k8s-image-pull-backoff
        title: ImagePullBackOffActive
        condition: B
        data:
        - refId: A
          datasourceUid: prometheus
          relativeTimeRange:
            from: 600
            to: 0
          model:
            datasource:
              type: prometheus
              uid: prometheus
            editorMode: code
            expr: sum by (namespace, pod, container, reason) (max_over_time(kube_pod_container_status_waiting_reason{reason=~"ErrImagePull|ImagePullBackOff", namespace!="kube-system"}[10m]))
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          datasourceUid: __expr__
          relativeTimeRange:
            from: 0
            to: 0
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - A
              reducer:
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
            type: classic_conditions
        for: 5m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Pod cannot pull image (ErrImagePull/ImagePullBackOff) for at least 5 minutes.
          runbook_url: http://grafana.lan/dashboards
        labels:
          severity: critical
          category: kubernetes

      - uid: argocd-comparison-error-burst
        title: ArgoComparisonErrorBurst
        condition: B
        data:
        - refId: A
          datasourceUid: loki
          relativeTimeRange:
            from: 600
            to: 0
          model:
            datasource:
              type: loki
              uid: loki
            editorMode: code
            expr: sum(count_over_time({namespace="argocd"} |= "ComparisonError" [10m]))
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            queryType: instant
            range: false
            refId: A
        - refId: B
          datasourceUid: __expr__
          relativeTimeRange:
            from: 0
            to: 0
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - A
              reducer:
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
            type: classic_conditions
        for: 2m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: ArgoCD is reporting ComparisonError conditions.
          runbook_url: http://grafana.lan/dashboards
        labels:
          severity: warning
          category: observability

      - uid: mimir-ruler-api-5xx
        title: MimirRulerApi5xx
        condition: B
        data:
        - refId: A
          datasourceUid: loki
          relativeTimeRange:
            from: 300
            to: 0
          model:
            datasource:
              type: loki
              uid: loki
            editorMode: code
            expr: sum(count_over_time({app_kubernetes_io_name="mimir", container="gateway"} |= "GET /prometheus/api/v1/rules" |= " 502 " [5m]))
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            queryType: instant
            range: false
            refId: A
        - refId: B
          datasourceUid: __expr__
          relativeTimeRange:
            from: 0
            to: 0
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - A
              reducer:
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
            type: classic_conditions
        for: 2m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Mimir gateway is returning 5xx for ruler/rules API calls.
          runbook_url: http://grafana.lan/dashboards
        labels:
          severity: critical
          category: observability

      - uid: grafana-alert-delivery-failure
        title: GrafanaAlertDeliveryFailure
        condition: B
        data:
        - refId: A
          datasourceUid: loki
          relativeTimeRange:
            from: 600
            to: 0
          model:
            datasource:
              type: loki
              uid: loki
            editorMode: code
            expr: sum(count_over_time({app_kubernetes_io_name="grafana"} |= "logger=ngalert.notifier" |= "Notify for alerts failed" [10m]))
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            queryType: instant
            range: false
            refId: A
        - refId: B
          datasourceUid: __expr__
          relativeTimeRange:
            from: 0
            to: 0
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - A
              reducer:
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            refId: B
            type: classic_conditions
        for: 2m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: Grafana failed to deliver one or more alerts to a notifier.
          runbook_url: http://grafana.lan/dashboards
        labels:
          severity: warning
          category: observability

      - uid: grafana-slack-canary-half-hour
        title: GrafanaSlackCanaryHalfHour
        condition: C
        data:
        - refId: A
          datasourceUid: prometheus
          relativeTimeRange:
            from: 60
            to: 0
          model:
            datasource:
              type: prometheus
              uid: prometheus
            editorMode: code
            expr: time()
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: A
        - refId: B
          datasourceUid: prometheus
          relativeTimeRange:
            from: 60
            to: 0
          model:
            datasource:
              type: prometheus
              uid: prometheus
            editorMode: code
            expr: (time() % 1800) < bool 60
            instant: true
            intervalMs: 1000
            maxDataPoints: 43200
            range: false
            refId: B
        - refId: C
          datasourceUid: __expr__
          relativeTimeRange:
            from: 0
            to: 0
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - B
              reducer:
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: B
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: classic_conditions
        for: 0s
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: Grafana slack canary fired (half-hour heartbeat)
          runbook_url: http://grafana.lan/d/cluster-overview/cluster-overview
        labels:
          severity: info
          category: canary
