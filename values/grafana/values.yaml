replicas: 1

adminPassword: admin
envFromSecret: grafana-alerting-secret

persistence:
  enabled: false

auth:
  anonymous:
    enabled: true
    org_role: Viewer

grafana.ini:
  auth.anonymous:
    enabled: true
    org_role: Viewer
  users:
    allow_sign_up: false
  tracing.opentelemetry.otlp:
    address: k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.lan
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 200m
    memory: 256Mi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      uid: prometheus
      type: prometheus
      url: http://prometheus-server.monitoring.svc.cluster.local:80
      access: proxy
      isDefault: true
    - name: Mimir
      uid: mimir
      type: prometheus
      url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
      access: proxy
    - name: Loki
      uid: loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
    - name: Tempo
      uid: tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      access: proxy

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/default
