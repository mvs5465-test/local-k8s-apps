replicas: 1

adminPassword: admin

persistence:
  enabled: false

auth:
  anonymous:
    enabled: true
    org_role: Viewer

grafana.ini:
  auth.anonymous:
    enabled: true
    org_role: Viewer
  users:
    allow_sign_up: false
  tracing.opentelemetry.otlp:
    address: k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.lan
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 200m
    memory: 256Mi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      uid: prometheus
      type: prometheus
      url: http://prometheus-server.monitoring.svc.cluster.local:80
      access: proxy
      isDefault: true
    - name: Mimir
      uid: mimir
      type: prometheus
      url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
      access: proxy
    - name: Loki
      uid: loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
    - name: Tempo
      uid: tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      access: proxy

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/default
    - name: 'kubernetes-community'
      orgId: 1
      folder: 'Kubernetes Community'
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/kubernetes-community
    - name: 'observability-community'
      orgId: 1
      folder: 'Observability Community'
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/observability-community

dashboards:
  kubernetes-community:
    k8s-views-global:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/v3.0.1/dashboards/k8s-views-global.json
      datasource: Prometheus
    k8s-views-namespaces:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/v3.0.1/dashboards/k8s-views-namespaces.json
      datasource: Prometheus
    k8s-views-nodes:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/v3.0.1/dashboards/k8s-views-nodes.json
      datasource: Prometheus
    k8s-views-pods:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/v3.0.1/dashboards/k8s-views-pods.json
      datasource: Prometheus
  observability-community:
    loki-operational:
      url: https://raw.githubusercontent.com/grafana/loki/v3.6.5/production/loki-mixin-compiled/dashboards/loki-operational.json
    mimir-overview:
      url: https://raw.githubusercontent.com/grafana/mimir/mimir-3.0.1/operations/mimir-mixin-compiled/dashboards/mimir-overview.json
    tempo-writes:
      url: https://raw.githubusercontent.com/grafana/tempo/v2.10.1/operations/tempo-mixin-compiled/dashboards/tempo-writes.json
