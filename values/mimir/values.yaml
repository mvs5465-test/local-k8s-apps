alertmanager:
  enabled: false

ruler:
  enabled: false

ingester:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    size: 2Gi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

query_scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

compactor:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  persistentVolume:
    size: 2Gi

store_gateway:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    size: 2Gi

distributor:
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 300m
      memory: 256Mi

gateway:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
  nginx:
    config:
      # Chart 6.0.5 still scrapes the nginx gateway on /metrics even though it does not expose native Prometheus metrics.
      # Serve an empty 200 response so the target is healthy until the upstream chart fix is available in a released version.
      serverSnippet: |
        location = /metrics {
          default_type text/plain;
          auth_basic off;
          return 200 "";
        }

rollout_operator:
  enabled: false

kafka:
  enabled: false

mimir:
  structuredConfig:
    ingest_storage:
      enabled: false
    ingester:
      push_grpc_method_enabled: true
      ring:
        replication_factor: 1
    query_scheduler:
      max_outstanding_requests_per_tenant: 64
    querier:
      max_concurrent: 4
    store_gateway:
      sharding_ring:
        replication_factor: 1

minio:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 256Mi
  persistence:
    size: 2Gi

metaMonitoring:
  serviceMonitor:
    enabled: true
