replicas: 1

tempo:
  reportingEnabled: false
  memBallastSizeMbs: 256
  retention: 24h
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://prometheus-server.monitoring.svc.cluster.local/api/v1/write"
    processor:
      service_graphs:
        wait: 10s
        max_items: 10000
      span_metrics:
        enable_target_info: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

service:
  type: ClusterIP

serviceMonitor:
  enabled: false

persistence:
  enabled: true
  enableStatefulSetAutoDeletePVC: true
  size: 2Gi

tempoQuery:
  enabled: false
