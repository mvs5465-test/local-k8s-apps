    spec:
      serviceAccountName: argocd-image-updater
      securityContext:
        runAsNonRoot: true
      containers:
        - name: argocd-image-updater-controller
          command:
            - /manager
          args:
            - --metrics-bind-address=:8443
            - run
          env:
          - name: ARGOCD_NAMESPACE
            valueFrom:
              configMapKeyRef:
                key: argocd.namespace
                name: argocd-image-updater-config
                optional: true
