apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-master-reader
  namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: external-secrets-master-reader
  namespace: external-secrets
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-master-reader
  namespace: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: external-secrets-master-reader
subjects:
- kind: ServiceAccount
  name: external-secrets-master-reader
  namespace: external-secrets
