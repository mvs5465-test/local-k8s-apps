apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-restart-controller
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: image-restart-controller
rules:
- apiGroups: [""]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: image-restart-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: image-restart-controller
subjects:
- kind: ServiceAccount
  name: image-restart-controller
  namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: image-restart-controller-script
  namespace: monitoring
data:
  restart_if_digest_changed.py: |
    import json
    import os
    import re
    import ssl
    import urllib.error
    import urllib.parse
    import urllib.request
    from datetime import datetime, timezone


    KUBE_API = os.environ.get("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
    KUBE_PORT = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
    KUBE_BASE = f"https://{KUBE_API}:{KUBE_PORT}"
    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    WATCH_ITEMS = [
      {
        "namespace": "services",
        "deployment": "cluster-home",
        "container": "cluster-home",
        "image": "ghcr.io/mvs5465-test/cluster-home:main",
      },
      {
        "namespace": "services",
        "deployment": "cluster-lite-wiki",
        "container": "cluster-lite-wiki",
        "image": "ghcr.io/mvs5465-test/cluster-lite-wiki:main",
      },
      {
        "namespace": "ai",
        "deployment": "cluster-query-router",
        "container": "cluster-query-router",
        "image": "ghcr.io/mvs5465-test/cluster-query-router:main",
      },
      {
        "namespace": "github-pr-slack-notifier",
        "deployment": "github-pr-slack-notifier-github-pr-slack-notifier",
        "container": "github-pr-slack-notifier",
        "image": "ghcr.io/mvs5465-test/github-pr-slack-notifier:main",
      },
      {
        "namespace": "monitoring",
        "deployment": "loki-mcp",
        "container": "loki-mcp",
        "image": "ghcr.io/mvs5465-test/loki-mcp-server:main",
      },
    ]

    DIGEST_RE = re.compile(r"sha256:[a-f0-9]{64}")


    def load_token():
      with open(TOKEN_PATH, "r", encoding="utf-8") as f:
        return f.read().strip()


    def kube_request(path, method="GET", payload=None):
      token = load_token()
      url = f"{KUBE_BASE}{path}"
      data = None
      headers = {
        "Authorization": f"Bearer {token}",
        "Accept": "application/json",
      }
      if payload is not None:
        data = json.dumps(payload).encode("utf-8")
        headers["Content-Type"] = "application/merge-patch+json"
      req = urllib.request.Request(url, data=data, headers=headers, method=method)
      context = ssl.create_default_context(cafile=CA_PATH)
      with urllib.request.urlopen(req, context=context, timeout=15) as resp:
        return json.loads(resp.read().decode("utf-8"))


    def parse_image_ref(image):
      if "@" in image:
        image = image.split("@", 1)[0]
      parts = image.rsplit(":", 1)
      if len(parts) == 1:
        return parts[0], "latest"
      return parts[0], parts[1]


    def get_ghcr_token(repo):
      scope = urllib.parse.quote(f"repository:{repo}:pull", safe=":")
      token_url = f"https://ghcr.io/token?scope={scope}"
      req = urllib.request.Request(token_url, headers={"Accept": "application/json"})
      with urllib.request.urlopen(req, timeout=15) as resp:
        payload = json.loads(resp.read().decode("utf-8"))
      return payload.get("token")


    def fetch_manifest(repo, reference, token, accept_header):
      url = f"https://ghcr.io/v2/{repo}/manifests/{reference}"
      req = urllib.request.Request(
        url,
        headers={
          "Authorization": f"Bearer {token}",
          "Accept": accept_header,
        },
      )
      with urllib.request.urlopen(req, timeout=15) as resp:
        body = resp.read().decode("utf-8")
        digest = resp.headers.get("Docker-Content-Digest", "")
      payload = json.loads(body)
      return payload, digest


    def latest_digest_for_arch(image, arch):
      repo_with_host, tag = parse_image_ref(image)
      if not repo_with_host.startswith("ghcr.io/"):
        raise RuntimeError(f"only ghcr.io images are supported: {image}")
      repo = repo_with_host[len("ghcr.io/"):]
      token = get_ghcr_token(repo)

      index_payload, index_digest = fetch_manifest(
        repo,
        tag,
        token,
        ", ".join([
          "application/vnd.oci.image.index.v1+json",
          "application/vnd.docker.distribution.manifest.list.v2+json",
          "application/vnd.oci.image.manifest.v1+json",
          "application/vnd.docker.distribution.manifest.v2+json",
        ]),
      )

      manifests = index_payload.get("manifests")
      if manifests:
        for manifest in manifests:
          platform = manifest.get("platform", {})
          if platform.get("os") == "linux" and platform.get("architecture") == arch:
            return manifest.get("digest", "")
        raise RuntimeError(f"no linux/{arch} manifest found for {image}")

      if index_digest:
        return index_digest
      raise RuntimeError(f"no digest found for {image}")


    def extract_running_digest(image_id):
      if not image_id:
        return ""
      match = DIGEST_RE.search(image_id)
      return match.group(0) if match else ""


    def deployment_in_progress(deployment):
      spec_replicas = deployment.get("spec", {}).get("replicas", 1)
      status = deployment.get("status", {})
      updated = status.get("updatedReplicas", 0)
      available = status.get("availableReplicas", 0)
      observed = status.get("observedGeneration", 0)
      generation = deployment.get("metadata", {}).get("generation", 0)
      if observed < generation:
        return True
      if updated < spec_replicas:
        return True
      if available < spec_replicas:
        return True
      return False


    def pick_pod(namespace, deployment):
      selector = deployment.get("spec", {}).get("selector", {}).get("matchLabels", {})
      if not selector:
        return None
      label_selector = ",".join([f"{k}={v}" for k, v in selector.items()])
      path = f"/api/v1/namespaces/{namespace}/pods?labelSelector={urllib.parse.quote(label_selector, safe='=,')}"
      pods = kube_request(path)
      items = pods.get("items", [])
      running = [p for p in items if p.get("status", {}).get("phase") == "Running"]
      if not running:
        return None
      return running[0]


    def node_arch(node_name):
      node = kube_request(f"/api/v1/nodes/{node_name}")
      return node.get("status", {}).get("nodeInfo", {}).get("architecture", "amd64")


    def container_image_id(pod, container_name):
      statuses = pod.get("status", {}).get("containerStatuses", [])
      for status in statuses:
        if status.get("name") == container_name:
          return status.get("imageID", "")
      return ""


    def restart_deployment(namespace, deployment_name, latest_digest):
      now = datetime.now(timezone.utc).isoformat()
      patch = {
        "spec": {
          "template": {
            "metadata": {
              "annotations": {
                "cluster.local/image-restart-at": now,
                "cluster.local/image-latest-digest": latest_digest,
              }
            }
          }
        }
      }
      kube_request(
        f"/apis/apps/v1/namespaces/{namespace}/deployments/{deployment_name}",
        method="PATCH",
        payload=patch,
      )


    def main():
      failures = 0
      for item in WATCH_ITEMS:
        ns = item["namespace"]
        deploy_name = item["deployment"]
        container = item["container"]
        image = item["image"]
        target = f"{ns}/{deploy_name}:{container}"
        try:
          deployment = kube_request(f"/apis/apps/v1/namespaces/{ns}/deployments/{deploy_name}")
          if deployment_in_progress(deployment):
            print(f"[skip] {target} rollout in progress")
            continue

          pod = pick_pod(ns, deployment)
          if not pod:
            print(f"[skip] {target} no running pod found")
            continue

          image_id = container_image_id(pod, container)
          running_digest = extract_running_digest(image_id)
          if not running_digest:
            print(f"[skip] {target} could not parse running digest from imageID={image_id}")
            continue

          arch = node_arch(pod.get("spec", {}).get("nodeName", ""))
          latest_digest = latest_digest_for_arch(image, arch)
          if latest_digest == running_digest:
            print(f"[ok]   {target} digest unchanged ({running_digest})")
            continue

          print(f"[diff] {target} running={running_digest} latest={latest_digest} -> restart")
          restart_deployment(ns, deploy_name, latest_digest)
        except Exception as exc:  # pylint: disable=broad-exception-caught
          failures += 1
          print(f"[err]  {target} {exc}")

      if failures > 0:
        raise SystemExit(1)


    if __name__ == "__main__":
      main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-restart-controller
  namespace: monitoring
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: image-restart-controller
          restartPolicy: Never
          containers:
          - name: controller
            image: python:3.12-alpine
            imagePullPolicy: IfNotPresent
            command:
            - python
            - /opt/controller/restart_if_digest_changed.py
            volumeMounts:
            - name: script
              mountPath: /opt/controller
              readOnly: true
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 150m
                memory: 256Mi
          volumes:
          - name: script
            configMap:
              name: image-restart-controller-script
              defaultMode: 0555
