apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-config
        image: busybox:1.37
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          set -eu
          mkdir -p /home/node/.openclaw/workspace/references
          mkdir -p /home/node/.openclaw/extensions/cluster-observe
          cp /bootstrap/config/openclaw.json /home/node/.openclaw/openclaw.json
          cp /bootstrap/config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
          cp /bootstrap/extensions/cluster-observe/package.json /home/node/.openclaw/extensions/cluster-observe/package.json
          cp /bootstrap/extensions/cluster-observe/openclaw.plugin.json /home/node/.openclaw/extensions/cluster-observe/openclaw.plugin.json
          cp /bootstrap/extensions/cluster-observe/index.js /home/node/.openclaw/extensions/cluster-observe/index.js
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: 32Mi
            cpu: 25m
          limits:
            memory: 64Mi
            cpu: 100m
        volumeMounts:
        - name: openclaw-home
          mountPath: /home/node/.openclaw
        - name: config
          mountPath: /bootstrap
        - name: tmp-volume
          mountPath: /tmp
      containers:
      - name: gateway
        image: ghcr.io/openclaw/openclaw:slim
        imagePullPolicy: IfNotPresent
        command:
        - node
        - /app/dist/index.js
        - gateway
        - run
        ports:
        - name: http
          containerPort: 18789
          protocol: TCP
        env:
        - name: HOME
          value: /home/node
        - name: OPENCLAW_CONFIG_DIR
          value: /home/node/.openclaw
        - name: NODE_ENV
          value: production
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPENCLAW_GATEWAY_TOKEN
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: "1"
        livenessProbe:
          exec:
            command:
            - node
            - -e
            - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - node
            - -e
            - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: openclaw-home
          mountPath: /home/node/.openclaw
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: openclaw-home
        persistentVolumeClaim:
          claimName: openclaw-home-pvc
      - name: config
        configMap:
          name: openclaw-config
          items:
          - key: openclaw.json
            path: config/openclaw.json
          - key: AGENTS.md
            path: config/AGENTS.md
          - key: cluster-observe.package.json
            path: extensions/cluster-observe/package.json
          - key: cluster-observe.plugin.json
            path: extensions/cluster-observe/openclaw.plugin.json
          - key: cluster-observe.index.js
            path: extensions/cluster-observe/index.js
      - name: tmp-volume
        emptyDir: {}
