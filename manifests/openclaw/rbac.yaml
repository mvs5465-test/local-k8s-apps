apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: ai
imagePullSecrets:
- name: ghcr-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-readonly
rules:
- apiGroups: [""]
  resources:
  - namespaces
  - nodes
  - pods
  - events
  verbs:
  - get
  - list
  - watch
- apiGroups: ["apps"]
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups: ["batch"]
  resources:
  - jobs
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-readonly
subjects:
- kind: ServiceAccount
  name: openclaw
  namespace: ai
