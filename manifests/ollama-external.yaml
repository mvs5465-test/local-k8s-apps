apiVersion: v1
kind: Service
metadata:
  name: ollama-external
  namespace: ai
  labels:
    app: ollama
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
  - port: 11434
    targetPort: 11434
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ollama-external
  namespace: ai
spec:
  subsets:
  - addresses:
    - ip: 127.0.0.1
    ports:
    - port: 11434
