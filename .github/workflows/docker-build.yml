name: Docker Build

on:
  pull_request:
    paths:
      - "docker/ollama-mcp-bridge/Dockerfile"
  push:
    branches: [main]
    paths:
      - "docker/ollama-mcp-bridge/Dockerfile"
  workflow_dispatch:

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    uses: mvs5465-test/.github/.github/workflows/docker-build.yml@main
    with:
      image_name: mvs5465-test/ollama-mcp-bridge
      context: docker/ollama-mcp-bridge
