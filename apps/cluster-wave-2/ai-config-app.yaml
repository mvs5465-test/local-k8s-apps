apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-config
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/local-k8s-apps
    targetRevision: main
    path: manifests/ai
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  ignoreDifferences:
  - group: discovery.k8s.io
    kind: EndpointSlice
    jqPathExpressions:
    - '.metadata.annotations."argocd.argoproj.io/tracking-id"'
    - '.endpoints[]?.conditions'
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      enabled: true
      prune: true
      selfHeal: true
