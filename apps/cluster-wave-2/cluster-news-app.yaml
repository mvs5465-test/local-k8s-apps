apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-news
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/cluster-news
    targetRevision: main
    path: chart
    helm:
      releaseName: cluster-news
      values: |
        replicaCount: 1
        service:
          type: ClusterIP
          port: 8080
        ingress:
          enabled: true
          className: traefik
          hosts:
            - host: news.lan
              paths:
                - path: /
                  pathType: Prefix
        env:
          NEWS_SITE_NAME: "Cluster News"
          NEWS_REFRESH_MINUTES: "30"
          OLLAMA_BASE_URL: "http://ollama-external.ai.svc.cluster.local:11434"
          OLLAMA_MODEL: "llama3.2:3b"
        feeds:
          inlineJson: |
            [
              {
                "name": "BBC World",
                "url": "https://feeds.bbci.co.uk/news/world/rss.xml",
                "category": "World"
              },
              {
                "name": "Reuters World",
                "url": "https://feeds.reuters.com/Reuters/worldNews",
                "category": "World"
              },
              {
                "name": "The Verge",
                "url": "https://www.theverge.com/rss/index.xml",
                "category": "Tech"
              },
              {
                "name": "Ars Technica",
                "url": "https://feeds.arstechnica.com/arstechnica/index",
                "category": "Tech"
              },
              {
                "name": "Hacker News",
                "url": "https://hnrss.org/frontpage",
                "category": "Ideas"
              }
            ]
        otel:
          endpoint: "http://k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
        persistence:
          enabled: true
          size: 1Gi
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
  destination:
    server: https://kubernetes.default.svc
    namespace: services
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      enabled: true
      prune: true
      selfHeal: true
