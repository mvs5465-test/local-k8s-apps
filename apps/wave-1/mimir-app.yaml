apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimir
  namespace: argocd
spec:
  project: cluster
  sources:
    - repoURL: https://github.com/mvs5465-test/local-k8s-apps
      targetRevision: HEAD
      ref: values

    - repoURL: https://grafana.github.io/helm-charts
      targetRevision: 6.0.5
      chart: mimir-distributed
      helm:
        releaseName: mimir
        valueFiles:
          - $values/values/mimir/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
