apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    cluster.local/migration-followup: "https://github.com/mvs5465-test/local-k8s-apps/issues/203"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.1.0
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        crds:
          conversion:
            enabled: true
          # Temporary compatibility during v1beta1 -> v1 migration.
          # Remove after issue #203 acceptance criteria are complete.
          unsafeServeV1Beta1: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        webhook:
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        certController:
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    # Temporary for CRD migration apply conflicts/annotation size limits.
    # Remove after issue #203 acceptance criteria are complete.
    - Replace=true
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
