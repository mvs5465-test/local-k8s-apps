apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: cluster
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 25.3.1
    chart: prometheus
    helm:
      releaseName: prometheus
      values: |
        server:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          retention: "7d"
          persistentVolume:
            enabled: true
            size: 2Gi
          service:
            type: ClusterIP
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - prometheus.lan
            path: /
            pathType: Prefix
          extraFlags:
            - web.enable-lifecycle
            - web.enable-remote-write-receiver

        serverFiles:
          prometheus.yml:
            rule_files:
              - /etc/config/recording_rules.yml
              - /etc/config/alerting_rules.yml
              - /etc/config/rules
              - /etc/config/alerts
            scrape_configs:
              - job_name: prometheus
                static_configs:
                  - targets:
                      - localhost:9090

        alertmanager:
          enabled: false

        kube-state-metrics:
          enabled: false

        prometheus-node-exporter:
          enabled: false

        prometheus-pushgateway:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
