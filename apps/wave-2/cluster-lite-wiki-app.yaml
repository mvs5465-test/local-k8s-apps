apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-lite-wiki
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/mvs5465-test/cluster-lite-wiki
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^main$
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    argocd-image-updater.argoproj.io/app.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-image-updater-git-creds
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/cluster-lite-wiki
    targetRevision: main
    path: chart
    helm:
      releaseName: cluster-lite-wiki
      values: |
        replicaCount: 1
        image:
          repository: ghcr.io/mvs5465-test/cluster-lite-wiki
          tag: main
          pullPolicy: Always
        service:
          type: ClusterIP
          port: 8080
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: wiki.lan
              paths:
                - path: /
                  pathType: Prefix
        otel:
          endpoint: "http://k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
        env:
          WIKI_SITE_NAME: "Cluster Lite Wiki"
        persistence:
          enabled: true
          size: 1Gi
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
  destination:
    server: https://kubernetes.default.svc
    namespace: services
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
