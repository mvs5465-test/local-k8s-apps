apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-mcp
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/mvs5465-test/loki-mcp-server
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^main$
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    argocd-image-updater.argoproj.io/app.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-repo-creds
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/loki-mcp-server
    targetRevision: main
    path: chart
    helm:
      releaseName: loki-mcp
      values: |
        replicaCount: 1
        image:
          repository: ghcr.io/mvs5465-test/loki-mcp-server
          tag: main
          pullPolicy: Always
        service:
          type: ClusterIP
          port: 8000
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: loki-mcp.lan
              paths:
                - path: /
                  pathType: Prefix
        env:
          LOKI_URL: "http://loki.monitoring.svc.cluster.local:3100"
        otel:
          endpoint: "http://k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
