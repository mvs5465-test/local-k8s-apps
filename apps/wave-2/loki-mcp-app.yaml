apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-mcp
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465/loki-mcp-server
    targetRevision: main
    path: chart
    helm:
      releaseName: loki-mcp
      values: |
        replicaCount: 1
        image:
          repository: ghcr.io/mvs5465/loki-mcp-server
          tag: main
          pullPolicy: Always
        service:
          type: ClusterIP
          port: 8000
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: loki-mcp.lan
              paths:
                - path: /
                  pathType: Prefix
        env:
          LOKI_URL: "http://loki.monitoring.svc.cluster.local:3100"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
