apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-query-router
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/mvs5465-test/cluster-query-router:main
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^main$
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    argocd-image-updater.argoproj.io/app.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-repo-creds
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/cluster-query-router
    targetRevision: main
    path: chart
    helm:
      releaseName: cluster-query-router
      values: |
        env:
          LOKI_MCP_URL: "http://loki-mcp.monitoring.svc.cluster.local:8000"
          PROMETHEUS_MCP_URL: "http://prometheus-mcp.monitoring.svc.cluster.local:8080"
          OLLAMA_URL: "http://ollama.ai.svc.cluster.local:11434"
        resources:
          requests:
            cpu: "75m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        otel:
          endpoint: "http://k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
        ingress:
          enabled: true
          className: nginx
          host: info.lan
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
