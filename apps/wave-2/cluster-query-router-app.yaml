apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-query-router
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/cluster-query-router
    targetRevision: main
    path: chart
    helm:
      releaseName: cluster-query-router
      values: |
        env:
          LOKI_MCP_URL: "http://loki-mcp.monitoring.svc.cluster.local:8000"
          PROMETHEUS_MCP_URL: "http://prometheus-mcp.monitoring.svc.cluster.local:8080"
          OLLAMA_URL: "http://ollama.ai.svc.cluster.local:11434"
        resources:
          requests:
            cpu: "75m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        ingress:
          enabled: true
          className: nginx
          host: info.lan
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
