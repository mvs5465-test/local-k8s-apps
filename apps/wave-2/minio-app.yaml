apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  project: cluster
  sources:
    - repoURL: https://github.com/mvs5465-test/local-k8s-apps
      targetRevision: HEAD
      ref: values

    - repoURL: https://github.com/mvs5465-test/local-k8s-apps
      targetRevision: HEAD
      path: manifests/minio-storage

    - repoURL: https://charts.min.io
      targetRevision: 5.4.0
      chart: minio
      helm:
        releaseName: minio
        valueFiles:
          - $values/values/minio/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: backups

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
