apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-pr-slack-notifier
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/github-pr-slack-notifier
    targetRevision: main
    path: chart
    helm:
      releaseName: github-pr-slack-notifier
      values: |
        image:
          repository: ghcr.io/mvs5465-test/github-pr-slack-notifier
          tag: main
          pullPolicy: Always
        env:
          GITHUB_APP_ID: "3033615"
          GITHUB_INSTALLATION_IDS: "114715075"
          ROUTES_JSON: '[{"name":"org-main","org_pattern":"mvs5465-test","repo_pattern":"*","channel":"C0AK08X7E11"}]'
          POLL_INTERVAL_SECONDS: "30"
          DRY_RUN: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: github-pr-slack-notifier
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
