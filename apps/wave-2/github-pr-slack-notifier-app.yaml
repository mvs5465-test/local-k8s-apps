apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-pr-slack-notifier
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/github-pr-slack-notifier
    targetRevision: main
    path: chart
    helm:
      releaseName: github-pr-slack-notifier
      values: |
        image:
          repository: ghcr.io/mvs5465-test/github-pr-slack-notifier
          tag: main
          pullPolicy: Always
        imagePullSecrets:
          - name: ghcr-secret
        env:
          GITHUB_APP_ID: "3033615"
          GITHUB_INSTALLATION_IDS: "114715075"
          ROUTES_JSON: '[{"name":"org-main","org_pattern":"mvs5465-test","repo_pattern":"*","channel":"C0AK08X7E11"}]'
          POLL_INTERVAL_SECONDS: "10"
          ENABLE_HISTORICAL_CLOSED_PRS: "false"
          DRY_RUN: "false"
          LOG_LEVEL: "INFO"
          JSON_LOGS: "true"
          METRICS_ENABLED: "true"
          METRICS_PORT: "9000"
          OTEL_SERVICE_NAME: "github-pr-slack-notifier"
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4318/v1/traces"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
  destination:
    server: https://kubernetes.default.svc
    namespace: github-pr-slack-notifier
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
