apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-home
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465-test/cluster-home
    targetRevision: main
    path: chart
    helm:
      releaseName: cluster-home
      values: |
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: home.lan
              paths:
                - path: /
                  pathType: Prefix

        config:
          inlineJson: |
            {
              "title": "Cluster Home",
              "subtitle": "Human-friendly entry points into the local cluster.",
              "groups": [
                {
                  "name": "Infrastructure",
                  "items": [
                    {
                      "name": "ArgoCD",
                      "icon": "AR",
                      "url": "https://argocd.lan",
                      "description": "GitOps control plane and deployment status."
                    },
                    {
                      "name": "Grafana",
                      "icon": "GF",
                      "url": "http://grafana.lan",
                      "description": "Dashboards for metrics and logs."
                    },
                    {
                      "name": "Prometheus",
                      "icon": "PR",
                      "url": "http://prometheus.lan",
                      "description": "Time-series metrics and ad hoc queries."
                    },
                    {
                      "name": "Gatus",
                      "icon": "GT",
                      "url": "http://gatus.lan",
                      "description": "Service uptime and health checks."
                    }
                  ]
                },
                {
                  "name": "Apps",
                  "items": [
                    {
                      "name": "Wiki",
                      "icon": "WK",
                      "url": "http://wiki.lan",
                      "description": "Lightweight in-browser notes and runbooks."
                    }
                  ]
                }
              ]
            }
        otel:
          endpoint: "http://k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            cpu: 150m
            memory: 256Mi
        serviceAccount:
          create: false
          name: default

  destination:
    server: https://kubernetes.default.svc
    namespace: services

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      enabled: true
      prune: true
      selfHeal: true
