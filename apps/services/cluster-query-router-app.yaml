apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-query-router
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465/cluster-query-router
    targetRevision: main
    path: chart
    helm:
      releaseName: cluster-query-router
      values: |
        replicaCount: 1
        image:
          repository: ghcr.io/mvs5465/cluster-query-router
          tag: main
          pullPolicy: Always
        service:
          type: ClusterIP
          port: 8080
        env:
          LOKI_MCP_URL: "http://loki-mcp.monitoring.svc.cluster.local:8000"
          PROMETHEUS_MCP_URL: "http://prometheus-mcp.monitoring.svc.cluster.local:8080"
          OLLAMA_URL: "http://ollama-external.ai.svc.cluster.local:11434"
          OLLAMA_MODEL: "phi4-mini:latest"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
