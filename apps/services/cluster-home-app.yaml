apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-home
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://github.com/mvs5465/cluster-home
    targetRevision: main
    path: chart
    helm:
      releaseName: cluster-home
      values: |
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: home.lan
              paths:
                - path: /
                  pathType: Prefix

        config:
          inlineJson: |
            {
              "title": "Cluster Home",
              "subtitle": "Human-friendly entry points into the local cluster.",
              "groups": [
                {
                  "name": "Infrastructure",
                  "items": [
                    {
                      "name": "ArgoCD",
                      "icon": "AR",
                      "url": "https://argocd.lan",
                      "description": "GitOps control plane and deployment status."
                    },
                    {
                      "name": "Grafana",
                      "icon": "GF",
                      "url": "http://grafana.lan",
                      "description": "Dashboards for metrics and logs."
                    },
                    {
                      "name": "Prometheus",
                      "icon": "PR",
                      "url": "http://prometheus.lan",
                      "description": "Time-series metrics and ad hoc queries."
                    },
                    {
                      "name": "Gatus",
                      "icon": "GT",
                      "url": "http://gatus.lan",
                      "description": "Service uptime and health checks."
                    }
                  ]
                },
                {
                  "name": "Apps",
                  "items": [
                    {
                      "name": "Chat",
                      "icon": "CH",
                      "url": "http://chat.lan",
                      "description": "Open WebUI for local model chat."
                    },
                    {
                      "name": "Jellyfin",
                      "icon": "JF",
                      "url": "http://jellyfin.lan",
                      "description": "Media library and streaming."
                    },
                    {
                      "name": "Outline",
                      "icon": "OL",
                      "url": "http://outline.lan",
                      "description": "Collaborative wiki and knowledge base."
                    },
                    {
                      "name": "Wiki",
                      "icon": "WK",
                      "url": "http://wiki.lan",
                      "description": "Lightweight in-browser notes and runbooks."
                    }
                  ]
                },
                {
                  "name": "Tools",
                  "items": [
                    {
                      "name": "Cluster Info",
                      "icon": "CI",
                      "url": "http://info.lan",
                      "description": "Query and routing tools for cluster context."
                    }
                  ]
                }
              ]
            }

  destination:
    server: https://kubernetes.default.svc
    namespace: services

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
