apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama-mcp-bridge
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 3.x
    helm:
      releaseName: ollama-mcp-bridge
      values: |
        defaultPodOptions:
          imagePullSecrets:
            - name: ghcr-secret

        controllers:
          main:
            containers:
              main:
                command: ["/entrypoint.sh"]
                image:
                  repository: ghcr.io/mvs5465/ollama-mcp-bridge
                  tag: latest
                args:
                  - --ollama-url
                  - http://ollama.ai.svc.cluster.local:11434

        service:
          main:
            controller: main
            ports:
              http:
                port: 8000

        configMaps:
          mcp-config:
            enabled: true
            data:
              mcp-config.json: |
                {
                  "mcpServers": {
                    "prometheus": {
                      "url": "http://prometheus-mcp.monitoring.svc.cluster.local:8080/mcp",
                      "transport": "streamable-http"
                    }
                  }
                }

        persistence:
          mcp-config:
            enabled: true
            type: configMap
            name: ollama-mcp-bridge-mcp-config
            globalMounts:
              - path: /app/mcp-config.json
                subPath: mcp-config.json
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
